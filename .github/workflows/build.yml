name: Build Cross-Platform

on:
  push:
    branches: [main]
    paths: ['ver.txt', 'desc.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat ver.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Windows-x64.exe
          path: dist/GitHubClient.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat ver.txt)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Linux-x64
          path: dist/GitHubClient

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat ver.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-macOS-x64.app
          path: dist/GitHubClient.app

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version
        id: version
        run: echo "version=$(cat ver.txt)" >> $GITHUB_OUTPUT

      - name: Read description
        id: desc
        run: |
          if [ -f desc.txt ]; then
            echo "description=$(cat desc.txt)" >> $GITHUB_OUTPUT
          else
            echo "description=Release ${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GitHubClient v${{ steps.version.outputs.version }}
          body: ${{ steps.desc.outputs.description }}
          files: |
            artifacts/GitHubClient-Windows-x64.exe/GitHubClient.exe
            artifacts/GitHubClient-Linux-x64/GitHubClient
            artifacts/GitHubClient-macOS-x64.app/GitHubClient.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
