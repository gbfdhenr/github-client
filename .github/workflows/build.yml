name: Build Cross-Platform

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-cmake.outputs.version }}
      short_sha: ${{ steps.read-cmake.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from CMakeLists.txt
        id: read-cmake
        run: |
          printf 'version=%s\n' "$(grep -oP 'project\([^)]+VERSION \K[0-9.]+' CMakeLists.txt)" >> "$GITHUB_OUTPUT"
          printf 'short_sha=%s\n' "$(printf '%s' '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: get-version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          modules: 'qtnetworkauth'

      - name: Install OpenSSL
        shell: bash
        run: |
          choco install openssl -y
          echo "OPENSSL_ROOT_DIR=C:/Program Files/OpenSSL" >> "$GITHUB_ENV"

      - name: Download SQLite3
        shell: bash
        run: |
          curl -fsSL -o sqlite-dll.zip https://www.sqlite.org/2025/sqlite-dll-win-x64-3490100.zip
          curl -fsSL -o sqlite-src.zip https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip
          mkdir -p sqlite3
          unzip -o sqlite-dll.zip -d sqlite3
          unzip -o -j sqlite-src.zip -d sqlite3

      - name: Build SQLite3 import library
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          lib /def:sqlite3\sqlite3.def /out:sqlite3\sqlite3.lib /machine:x64
          echo SQLITE3_ROOT=%CD%\sqlite3>> %GITHUB_ENV%

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            -DSQLite3_INCLUDE_DIR="$SQLITE3_ROOT" \
            -DSQLite3_LIBRARY="$SQLITE3_ROOT/sqlite3.lib"

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Deploy with windeployqt
        shell: bash
        run: |
          windeployqt --release --no-translations build/Release/GitHubClient.exe
          cp "$SQLITE3_ROOT/sqlite3.dll" build/Release/
          cp "$OPENSSL_ROOT_DIR/bin/"*.dll build/Release/ 2>/dev/null || true

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          "$($wix.FullName)\bin" | Out-File -Append -Encoding UTF8 $env:GITHUB_PATH

      - name: Build MSI installer
        shell: cmd
        run: |
          heat dir build\Release -dr INSTALLFOLDER -cg ApplicationComponents -gg -sfrag -var var.SourceDir -out packaging\ApplicationComponents.wxs
          candle packaging\GitHubClient.wxs packaging\ApplicationComponents.wxs -arch x64 -dSourceDir=build\Release
          light -b build\Release -sice:ICE38 GitHubClient.wixobj ApplicationComponents.wixobj -out GitHubClient.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Windows-x64
          path: GitHubClient.msi

  build-linux-deb:
    needs: get-version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ qtbase5-dev libqt5sql5-sqlite \
            libssl-dev libsqlite3-dev dpkg-dev

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_RPATH='$ORIGIN/../lib/github-client'

      - name: Build
        run: cmake --build build --parallel

      - name: Create DEB package structure
        id: deb
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          SHA="${{ needs.get-version.outputs.short_sha }}"
          DEB_NAME="githubclient_${VERSION}.${SHA}_amd64"
          DEB_ROOT="packaging/${DEB_NAME}"

          mkdir -p ${DEB_ROOT}/DEBIAN
          mkdir -p ${DEB_ROOT}/usr/bin
          mkdir -p ${DEB_ROOT}/usr/lib/github-client
          mkdir -p ${DEB_ROOT}/usr/share/applications
          mkdir -p ${DEB_ROOT}/usr/share/icons/hicolor/256x256/apps

          # Copy binary
          cp build/GitHubClient ${DEB_ROOT}/usr/bin/

          # Copy bundled shared libraries
          for lib in $(ldd build/GitHubClient | grep -oP '/[^ ]+(?:libQt5|libssl|libcrypto|libsqlite3)[^ ]*\.so[^ ]*'); do
            cp -v "$lib" ${DEB_ROOT}/usr/lib/github-client/
          done

          # Copy Qt platform plugin
          QT_PLUGIN_DIR=$(dpkg -L qtbase5-dev | grep '/plugins/platforms$' | head -1 || \
            find /usr/lib -path '*/plugins/platforms' -type d 2>/dev/null | head -1)
          if [ -n "$QT_PLUGIN_DIR" ]; then
            mkdir -p ${DEB_ROOT}/usr/lib/github-client/platforms
            cp ${QT_PLUGIN_DIR}/libqxcb.so ${DEB_ROOT}/usr/lib/github-client/platforms/
          fi

          # Create wrapper script
          cat > ${DEB_ROOT}/usr/bin/githubclient << 'WRAPPER'
          #!/bin/bash
          export QT_PLUGIN_PATH=/usr/lib/github-client
          export LD_LIBRARY_PATH=/usr/lib/github-client:${LD_LIBRARY_PATH}
          exec /usr/bin/GitHubClient "$@"
          WRAPPER
          chmod +x ${DEB_ROOT}/usr/bin/githubclient

          # Create .desktop entry
          cat > ${DEB_ROOT}/usr/share/applications/githubclient.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=GitHub Client
          Comment=GitHub Desktop Client
          Exec=/usr/bin/githubclient
          Icon=githubclient
          Categories=Development;
          Terminal=false
          DESKTOP

          # Create control file
          cat > ${DEB_ROOT}/DEBIAN/control << CONTROL
          Package: githubclient
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: gbfdhenr <gbfdhenr@163.com>
          Depends: libc6 (>= 2.34), libstdc++6 (>= 9)
          Description: GitHub Desktop Client
           A C++/Qt5 native GitHub desktop client with dark theme,
           featuring repository browsing and cookie-based authentication.
          CONTROL

          # Build the deb
          dpkg-deb --build ${DEB_ROOT}
          mv packaging/${DEB_NAME}.deb .

          echo "deb_file=${DEB_NAME}.deb" >> $GITHUB_OUTPUT

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Linux-amd64-deb
          path: "*.deb"

  release:
    needs: [get-version, build-windows, build-linux-deb]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read release description
        id: release-desc
        run: |
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat RELEASE-DESC.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: GitHubClient v${{ needs.get-version.outputs.version }} (${{ needs.get-version.outputs.short_sha }})
          body: ${{ steps.release-desc.outputs.body }}
          files: |
            artifacts/**/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
