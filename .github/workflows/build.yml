name: Build Cross-Platform

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" --icon="NONE" main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Windows-x64.exe
          path: dist/GitHubClient.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Linux-x64
          path: dist/GitHubClient

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-macOS-x64.app
          path: dist/GitHubClient.app

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/GitHubClient-Windows-x64.exe/GitHubClient.exe
            artifacts/GitHubClient-Linux-x64/GitHubClient
            artifacts/GitHubClient-macOS-x64.app/GitHubClient.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
