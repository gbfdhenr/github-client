name: Build Cross-Platform

on:
  push:
    branches: [main]
    paths: ['ver.txt', 'desc.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-ver.outputs.version }}
      description: ${{ steps.read-desc.outputs.description }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Read version
        id: read-ver
        run: echo "version=$(cat ver.txt | tr -d '\r\n')" >> $GITHUB_OUTPUT
      
      - name: Read description
        id: read-desc
        run: |
          if [ -f desc.txt ]; then
            desc=$(cat desc.txt | tr -d '\r\n')
            echo "description=$desc" >> $GITHUB_OUTPUT
          else
            echo "description=Release v${{ steps.read-ver.outputs.version }}" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Windows-x64.exe
          path: dist/GitHubClient.exe

  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-Linux-x64
          path: dist/GitHubClient

  build-macos:
    needs: get-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "GitHubClient" main.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubClient-macOS-x64.app
          path: dist/GitHubClient.app

  release:
    needs: [get-version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: GitHubClient v${{ needs.get-version.outputs.version }}
          body: ${{ needs.get-version.outputs.description }}
          files: |
            artifacts/GitHubClient-Windows-x64.exe/GitHubClient.exe
            artifacts/GitHubClient-Linux-x64/GitHubClient
            artifacts/GitHubClient-macOS-x64.app/GitHubClient.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
